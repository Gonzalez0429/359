
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    
    <style>
        /* 全体の基本設定 */
        body { 
            background-color: #fff; /* 背景はごく薄いグレー */
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center; /* 左右中央に配置 */
        }

        /* 本文が入る箱（ここで余白と幅をコントロール） */
        .container { 
            width: 85%;            /* スマホでの基本幅 */
            max-width: 500px;      /* 左右余白を多めにするために幅を少し狭めに設定 */
            margin: 60px 0;        /* 上下の余白 */
            color: #2d3241;        /* 指定の文字色 */
            
            /* 書体を游明朝に（入っていない端末用に予備も指定） */
            font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "MS Mincho", serif;
            font-size: 0.7em;      /* 文字サイズを少し小さめに */
            line-height: 1.7;      /* 行間をゆったりと */
        }

        /* タイトルの設定 */
        h1 { 
            text-align: center;    /* 真ん中寄せ */
            font-size: 1.4em;      /* タイトルも控えめなサイズに */
            margin-bottom: 30px;   /* 本文との間隔 */
            font-weight: normal; 
        }

        /* 本文の設定 */
        .novel-text { 
            white-space: pre-wrap; /* 自動改行（メモ帳の改行を反映） */
            text-align: justify;   /* 文末を綺麗に揃える */
            word-wrap: break-word; /* 長い単語でもはみ出さない */
            letter-spacing: 0.03em; /* 文字間を少し広げて読みやすく */
        }

        /* 戻るリンク */
        .nav { 
            margin-top: 100px; 
            text-align: center; 
        }
        .nav a { 
            text-decoration: none; 
            color: #888; 
            font-size: 0.85em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>魔窟浪漫譚</h1>

    <div class="novel-text">
このお話には、現代文明（スマホやLINEや車など）や実在する商品が出てきます。現代色が強いストーリーに嫌悪感を抱く場合や、キャラの理想像を重視する方は閲覧をお控えください。シュールラブコメディなので、登場キャラ全員が何かしらのアホ要素を抱えています。

つまりは、キャラ崩壊が許せない方はご注意を！


        【登場人物と職業設定】
    </div>
   </div>
</div>
<script>
    window.onload = function() {
        // 保存されている名前を呼び出す
        let savedName = localStorage.getItem('dreamName');
        
        // もし名前が空っぽなら、デフォルトの名前（例：名無し）にする
        if (!savedName) {
            savedName = "ナマエ";
        }

        // ページ内の「〇〇」をすべて保存された名前に置き換える
        const bodyText = document.querySelector('.novel-text');
        if (bodyText) {
            bodyText.innerHTML = bodyText.innerHTML.replace(/#name#/g, savedName);
        }
    }
</script> 
</body>
</html>
