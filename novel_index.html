<!DOCTYPE html>

    <div style="background:#fff; padding20px; border0px dashed #fff; margin-bottom:10px; text-align:center;">
　　 <p style="font-size:0.8em; margin-bottom:10px;"></p>
    <input type="text" id="userName" placeholder="ナマエ" style="padding:5px; width:80px; height:15px;">
    <button onclick="saveName()" style="padding:5px5px;">決定</button>
</div>

<script>
    // 入力された名前をブラウザに保存する魔法
    function saveName() {
        const name = document.getElementById('userName').value;
        if(name) {
            localStorage.setItem('dreamName', name);
            alert('名前を「' + name + '」に設定しました。');
        }
    }
    // ページを開いた時に、もし保存された名前があれば表示する
    window.onload = function() {
        const savedName = localStorage.setItem('dreamName');
        if(savedName) document.getElementById('userName').value = savedName;
    }
</script>
