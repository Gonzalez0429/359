<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたのサイト名</title>
    <style>
@charset "UTF-8";

/* ウェブフォントの読み込み */
@import url('https://fonts.googleapis.com/css?family=Noto+Serif+JP|Raleway&display=swap');

/* 全体に適用する */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-weight: normal;
}

/* root */
:root {
    --color: #b4bbc1;
    --gray: #efefef;
    --white: #ffffff;
    --black: #333;
    --en: 'Raleway', 'Noto Serif JP', serif;
}

/* 基本設定 */
body {
    background-color: var(--white);
    text-align: left;
    line-height: 1.7;
    letter-spacing: 0.1em;
    font-size: 11px;
    font-family: 'Noto Serif JP', serif;
    color: var(--black);
}

/* リンク */
a,
a:visited {
    color: var(--black);
    transition: .5s all;
}

a:hover,
a:visited:hover {
    color: var(--black);
}

.wrap {
    margin: 3em auto;
    width: 80%;
}

/* 横幅768px以上で読み込む */
@media screen and (min-width: 768px) {
    .wrap {
        display: flex;
        justify-content: space-between;
        max-width: 800px;
    }

    header {
        flex-basis: 250px;
    }

    main {
        flex-basis: calc(100% - 280px);
    }
}

header {
    margin-bottom: 5em;
}

.headerBox {
    position: relative;
}

.headerBox img {
    width: 100%;
    height: auto;
}

.headerBox h1 {
    position: absolute;
    padding-top: 1em;
    padding-right: 0.2em;
    top: -20px;
    left: 50%;
    height: calc(100% + 40px);
    line-height: 1;
    transform: rotate(-20deg);
    writing-mode: vertical-rl;
    background-color: var(--white);
    font-size: 1.3em;
    color: var(--color);
}

header>h1 {
    font-size: 1.5em;
    color: var(--color);
}

nav {
    margin: 1.5em auto;
}

nav ul li {
    margin: 0.5em 1em 0.5em auto;
    padding-left: 0.5em;
    display: inline-block;
    border-left: 3px solid var(--color);
}

nav ul li a {
    text-decoration: none;
    font-size: 10px;
    font-family: var(--en);
    color: var(--color);
}

nav ul li a:visited {
    color: var(--color);
}

section {
    margin-bottom: 3em;
}

section h2 {
    margin-bottom: 0.5em;
    font-size: 1.5em;
    font-family: var(--en);
    color: var(--color);
}

section h3 {
    position: relative;
    margin-bottom: 1em;
    font-family: var(--en);
    font-size: 1.0em;
}

section h3::after {
    position: absolute;
    display: block;
    content: '';
    bottom: -0.5em;
    left: 0;
    width: 30px;
    height: 1px;
    background-color: var(--black);
}

section p {
    margin: 1em auto;
}

section span {
    font-weight: bold;
}

section mark {
    background-color: var(--gray);
}

section strong {
    font-weight: bold;
    color: red;
}

section em {
    border-bottom: thin dashed red;
}

section .link {
    display: inline-block;
    margin: 0.5em auto;
    padding: 0 1em;
    text-decoration: none;
    border: thin solid var(--color);
}

section .link:hover {
    background-color: var(--color);
}

section .en {
    font-family: var(--en);
}

section dl {
    margin: 1em auto;
}

section dd {
    margin-bottom: 1em;
    margin-left: 1em;
}

section ul {
    list-style-type: none;
}

section time {
    margin-right: 0.5em;
    padding-right: 0.5em;
    border-right: 5px solid var(--color);
}

.right {
    text-align: right;
}

input[type=text],
textarea {
    padding: 0.2em;
    border: thin solid var(--color);
    color: var(--color);
}

input[type=text] {
    min-width: 100px;
}

textarea {
    width: 300px;
    height: 100px;
}
    </style>
</head>
<body>

    <h1>サイト名（仮）</h1>
    
    <nav>
        <a href="#about">About</a>
        <a href="#main">Main</a>
    </nav>

    <div class="content">
        <section id="about">
            <h2>About</h2>
            <p>ここは壁打ち・ログ置き場です。二次創作を含みます。</p>
        </section>

        <hr>

        <section id="main">
            <h2>Main</h2>
            <p>作品一覧をここに書いていきます。</p>
            <ul>
                <li>作品タイトル1（準備中）</li>
            </ul>
        </section>
    </div>

</body>
</html>
